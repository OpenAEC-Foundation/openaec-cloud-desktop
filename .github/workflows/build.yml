name: Build OpenAEC Cloud (Windows)

on:
  workflow_dispatch: {}
  push:
    tags: ["v*"]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - run: npm install
      # Bouwt de Windows-installer (.msi + NSIS .exe). Bundelt WebView2 mee
      # (embedBootstrapper, zie tauri.conf.json). Publiceert bij een v*-tag een
      # release; anders staan de installers onder de workflow-artefacten.
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_type == 'tag' && github.ref_name || '' }}
          releaseName: "OpenAEC Cloud ${{ github.ref_name }}"
          releaseDraft: true
      # Bij een handmatige/branch-build is er geen release; upload dan de
      # installers als downloadbaar workflow-artefact.
      - name: Upload installers als artefact
        if: github.ref_type != 'tag'
        uses: actions/upload-artifact@v4
        with:
          name: openaec-cloud-windows-installer
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: error
